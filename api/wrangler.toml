name = "mkts-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
# Non-secret config
CORS_ORIGIN = "*"
RATE_LIMIT_MAX = "60"             # requests per minute per IP
DEFAULT_PAGE_SIZE = "100"
MAX_PAGE_SIZE = "500"
STANDINGS_THRESHOLD = "5"          # minimum standing required (reject < 5)

# Cron trigger: refresh character affiliations from ESI every 6 hours
[triggers]
crons = ["0 */6 * * *"]

# Secrets (set via `wrangler secret put <NAME>`):
#   TURSO_PRIMARY_URL
#   TURSO_PRIMARY_TOKEN
#   TURSO_DEPLOYMENT_URL
#   TURSO_DEPLOYMENT_TOKEN
